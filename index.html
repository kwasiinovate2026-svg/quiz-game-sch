<style>

:root{
  --stage-1:#0d0a1f;--stage-2:#150f2c;--panel:#241a40;--panel-2:#2d2150;--panel-line:rgba(255,255,255,.08);
  --gold:#ffd24a;--gold-deep:#f2a93b;--coral:#ff5d73;--coral-deep:#ff3d5a;--mint:#3ddc97;--mint-deep:#19c07c;
  --sky:#54b8ff;--sky-deep:#2f97ec;--violet:#c08bff;--ink:#f6f2ff;--muted:#b6a9da;--faint:#8a7eb0;
  --radius:18px;--radius-sm:12px;--shadow:0 18px 50px -20px rgba(0,0,0,.7);
  --display:'Space Grotesk',ui-sans-serif,system-ui,sans-serif;--body:'Outfit',ui-sans-serif,system-ui,-apple-system,sans-serif;--maxw:760px;
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:var(--body);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100dvh;overflow-x:hidden;
  background:radial-gradient(1200px 700px at 50% -8%,rgba(255,210,74,.10),transparent 60%),radial-gradient(900px 600px at 18% 110%,rgba(255,93,115,.10),transparent 60%),radial-gradient(900px 600px at 85% 115%,rgba(84,184,255,.10),transparent 60%),linear-gradient(180deg,var(--stage-2),var(--stage-1));}
body.ready .fade{animation:none}
body.ready .home .hsl,
body.ready .horb-wrap,
body.ready .hcard,
body.ready .waitdot{animation:none!important;opacity:1;transform:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:8px}
.app{max-width:var(--maxw);margin:0 auto;padding:18px 16px 120px;position:relative}
.topbar{display:flex;align-items:center;gap:12px;justify-content:space-between;padding:10px 14px;margin-bottom:18px;border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid var(--panel-line)}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:700}
.brand .dot{width:12px;height:12px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 4px rgba(255,210,74,.18),0 0 18px var(--gold)}
.brand small{display:block;font-weight:400;color:var(--faint);font-size:11px;letter-spacing:1.5px;text-transform:uppercase}
.topbar .right{display:flex;align-items:center;gap:8px}
.pill{font-size:12px;color:var(--muted);background:rgba(255,255,255,.06);border:1px solid var(--panel-line);padding:6px 11px;border-radius:999px}
.iconbtn{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:rgba(255,255,255,.06);border:1px solid var(--panel-line);font-size:16px}
.iconbtn:hover{background:rgba(255,255,255,.12)}
.hero{text-align:center;padding:14px 6px 8px}
.hero h1{font-family:var(--display);font-weight:700;font-size:clamp(32px,8.5vw,52px);line-height:1.03;margin:.1em 0 .15em;letter-spacing:-1px}
.hero h1 .glow{background:linear-gradient(120deg,var(--gold),var(--coral) 60%,var(--sky));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{color:var(--muted);max-width:34ch;margin:0 auto;font-size:16px;line-height:1.5}
.grid{display:grid;gap:12px;grid-template-columns:repeat(2,1fr);margin-top:22px}
.mode{text-align:left;border-radius:var(--radius);padding:18px 16px;position:relative;overflow:hidden;background:linear-gradient(165deg,var(--panel-2),var(--panel));border:1px solid var(--panel-line);box-shadow:var(--shadow);min-height:128px;display:flex;flex-direction:column;justify-content:space-between;transition:transform .15s,border-color .15s}
.mode:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.2)}
.mode .ic{font-size:24px;width:46px;height:46px;border-radius:14px;display:grid;place-items:center;background:rgba(255,255,255,.07);border:1px solid var(--panel-line)}
.mode h3{font-family:var(--display);font-weight:600;font-size:18px;margin:14px 0 4px}
.mode span{color:var(--muted);font-size:13px;line-height:1.4}
.mode.host .ic{color:var(--gold)}.mode.join .ic{color:var(--coral)}.mode.ai .ic{color:var(--sky)}.mode.solo .ic{color:var(--mint)}
.mode.full{grid-column:1/-1;min-height:auto;flex-direction:row;align-items:center;gap:16px}
.mode.full h3{margin:0}.mode.full .txt{flex:1}
.panel{background:rgba(24,20,44,.95);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:20px 18px;box-shadow:0 14px 32px -18px rgba(0,0,0,.55);margin-bottom:14px}
.panel h2{font-family:var(--display);font-weight:600;font-size:20px;margin:0 0 4px}
.panel .sub{color:var(--muted);font-size:14px;margin:0 0 16px}
.label{display:block;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin:14px 0 7px;font-weight:600}
.field{width:100%;padding:13px 14px;border-radius:var(--radius-sm);background:rgba(0,0,0,.25);border:1px solid var(--panel-line);color:var(--ink);font-size:16px}
.field::placeholder{color:var(--faint)}
.code-input{text-align:center;letter-spacing:8px;font-family:var(--display);font-weight:700;font-size:30px;text-transform:uppercase}
.seg{display:flex;gap:8px;flex-wrap:wrap}
.seg button{flex:1;min-width:fit-content;padding:11px 12px;border-radius:var(--radius-sm);background:rgba(255,255,255,.05);border:1px solid var(--panel-line);color:var(--muted);font-weight:600;font-size:14px;transition:.12s}
.seg button[aria-pressed="true"]{background:rgba(255,210,74,.16);border-color:var(--gold);color:var(--gold)}
.seg.coral button[aria-pressed="true"]{background:rgba(255,93,115,.16);border-color:var(--coral);color:#ffb7c1}
.seg.sky button[aria-pressed="true"]{background:rgba(84,184,255,.16);border-color:var(--sky);color:#bfe2ff}
.seg.mint button[aria-pressed="true"]{background:rgba(61,220,151,.16);border-color:var(--mint);color:#a9f0d2}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:15px 18px;border-radius:14px;font-family:var(--display);font-weight:600;font-size:17px;background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#3a2400;box-shadow:0 12px 30px -12px rgba(255,210,74,.6);transition:transform .12s,filter .12s}
.btn:hover{filter:brightness(1.05)}.btn:active{transform:scale(.985)}.btn:disabled{opacity:.5;cursor:not-allowed;filter:none;transform:none}
.btn.coral{background:linear-gradient(180deg,var(--coral),var(--coral-deep));color:#3a000c}
.btn.sky{background:linear-gradient(180deg,var(--sky),var(--sky-deep));color:#00203a}
.btn.mint{background:linear-gradient(180deg,var(--mint),var(--mint-deep));color:#00301e}
.btn.ghost{background:rgba(255,255,255,.06);border:1px solid var(--panel-line);color:var(--ink);box-shadow:none;font-weight:500}
.btn.sm{width:auto;padding:10px 16px;font-size:14px;border-radius:12px}
.btnrow{display:flex;gap:10px;margin-top:16px}.center{text-align:center}.muted{color:var(--muted)}.faint{color:var(--faint)}
.roomcode{font-family:var(--display);font-weight:700;font-size:46px;letter-spacing:10px;text-align:center;color:var(--gold);text-shadow:0 0 30px rgba(255,210,74,.4);margin:6px 0}
.players{display:flex;flex-direction:column;gap:9px;margin-top:6px}
.pcard{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid var(--panel-line)}
.avatar{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:17px;color:#1a1230;flex-shrink:0}
.pcard .nm{font-weight:600;flex:1}
.pcard .tag{font-size:11px;padding:3px 8px;border-radius:999px;font-weight:600}
.tag.host{background:rgba(255,210,74,.2);color:var(--gold)}.tag.ai{background:rgba(84,184,255,.2);color:var(--sky)}.tag.you{background:rgba(61,220,151,.2);color:var(--mint)}
.qmwrap{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
.qmorb{width:48px;height:48px;border-radius:50%;flex-shrink:0;position:relative;background:radial-gradient(circle at 35% 30%,#fff3c9,var(--gold-deep));box-shadow:0 0 0 4px rgba(255,210,74,.14),0 0 26px rgba(255,210,74,.5);animation:orb 3.4s ease-in-out infinite}
.qmorb::after{content:"";position:absolute;inset:9px;border-radius:50%;border:2px solid rgba(58,36,0,.35);border-top-color:transparent;border-right-color:transparent}
.qmorb.speaking{animation:orbspeak .5s ease-in-out infinite}
@keyframes orb{0%,100%{box-shadow:0 0 0 4px rgba(255,210,74,.14),0 0 22px rgba(255,210,74,.4)}50%{box-shadow:0 0 0 6px rgba(255,210,74,.18),0 0 34px rgba(255,210,74,.65)}}
@keyframes orbspeak{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
.qmbubble{flex:1;background:linear-gradient(165deg,#2c2056,#221940);border:1px solid rgba(255,255,255,.12);border-radius:16px;border-top-left-radius:4px;padding:13px 16px;box-shadow:var(--shadow)}
.qmbubble .who{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.qmbubble .who .live{width:7px;height:7px;border-radius:50%;background:var(--coral);box-shadow:0 0 8px var(--coral)}
.qmbubble .txt{font-size:15.5px;line-height:1.45;font-weight:500}
.qmbubble.mint{border-color:rgba(61,220,151,.45)}.qmbubble.mint .who{color:var(--mint)}
.qmbubble.coral{border-color:rgba(255,93,115,.45)}.qmbubble.coral .who{color:#ffb7c1}
.qmbubble.sky{border-color:rgba(84,184,255,.45)}.qmbubble.sky .who{color:#bfe2ff}
.stage{position:relative;padding-top:4px}
.spot{position:absolute;inset:-40px -60px auto -60px;height:360px;pointer-events:none;background:radial-gradient(440px 300px at 50% 0,rgba(255,210,74,.10),transparent 65%);opacity:.35;}
.qmeta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;position:relative;flex-wrap:wrap}
.rbadge{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;font-weight:700;padding:5px 10px;border-radius:999px;background:rgba(192,139,255,.16);border:1px solid rgba(192,139,255,.4);color:var(--violet)}
.qmeta .cat{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);font-weight:700}
.qmeta .num{font-size:12px;color:var(--faint);font-weight:600}
.qcard{position:relative;background:rgba(22,18,42,.98);border:1px solid rgba(255,255,255,.10);border-radius:20px;padding:22px 20px;box-shadow:0 14px 30px -16px rgba(0,0,0,.55);margin-bottom:14px}
.qcard .qtext{font-family:var(--display);font-weight:600;font-size:clamp(18px,4.8vw,25px);line-height:1.35}
.qcard .qtext .math-render,.opt .math-render{display:inline-block;vertical-align:middle;line-height:1.2}
.turnflag{display:inline-flex;align-items:center;gap:8px;margin-bottom:13px;font-size:13px;font-weight:600;padding:7px 12px;border-radius:999px;background:rgba(255,210,74,.14);border:1px solid rgba(255,210,74,.35);color:var(--gold)}
.turnflag.coral{background:rgba(255,93,115,.14);border-color:rgba(255,93,115,.35);color:#ffb7c1}
.turnflag.mint{background:rgba(61,220,151,.14);border-color:rgba(61,220,151,.35);color:#a9f0d2}
.qtimer{display:inline-flex;align-items:center;gap:7px;font-family:var(--display);font-weight:700;font-size:15px;padding:5px 12px;border-radius:999px;background:rgba(84,184,255,.14);border:1px solid rgba(84,184,255,.4);color:#bfe2ff}
.qtimer.low{background:rgba(255,93,115,.16);border-color:rgba(255,93,115,.5);color:#ffb7c1;animation:pulse 1s infinite}
.qtimer .ring{width:9px;height:9px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}
.buzzrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.buzzchip{display:inline-flex;align-items:center;gap:8px;padding:11px 15px;border-radius:14px;font-weight:600;font-size:15px;background:rgba(61,220,151,.14);border:1.5px solid rgba(61,220,151,.45);color:#a9f0d2;transition:.12s}
.buzzchip:hover{background:rgba(61,220,151,.24)}
.buzzchip.ai{background:rgba(84,184,255,.1);border-color:rgba(84,184,255,.3);color:#bfe2ff;opacity:.85}
.nameinputs{display:flex;flex-direction:column;gap:9px;margin-top:8px}
.pass{text-align:center;padding:26px 18px;border-radius:18px;background:linear-gradient(165deg,#2c2056,#221940);border:1px solid rgba(255,255,255,.12);box-shadow:var(--shadow);margin-bottom:14px}
.pass .ic{font-size:40px}.pass h3{font-family:var(--display);font-size:22px;margin:10px 0 4px}
.bonusbar{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;margin-bottom:12px;background:linear-gradient(90deg,rgba(255,93,115,.18),rgba(255,210,74,.12));border:1px solid rgba(255,93,115,.4);font-weight:600;font-size:14px;animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.options{display:grid;gap:10px;margin-top:4px}
.opt{display:flex;align-items:center;gap:13px;padding:15px 16px;border-radius:14px;text-align:left;background:rgba(255,255,255,.05);border:1.5px solid var(--panel-line);font-size:16px;font-weight:500;transition:.12s;width:100%}
.opt:hover:not(:disabled){background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25)}
.opt .key{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex-shrink:0;font-family:var(--display);font-weight:700;background:rgba(255,255,255,.08);font-size:14px}
.opt.picked{border-color:var(--gold);background:rgba(255,210,74,.12)}.opt.picked .key{background:var(--gold);color:#3a2400}
.opt.correct{border-color:var(--mint);background:rgba(61,220,151,.15)}.opt.correct .key{background:var(--mint);color:#00301e}
.opt.wrong{border-color:var(--coral);background:rgba(255,93,115,.13)}.opt.wrong .key{background:var(--coral);color:#3a000c}
.opt:disabled{cursor:default;opacity:.92}
.listen{padding:16px;border-radius:14px;background:rgba(255,255,255,.04);border:1px dashed var(--panel-line);text-align:center;color:var(--muted);font-size:14px}
.scorerail{display:flex;gap:10px;overflow-x:auto;padding:4px 2px 10px;margin-top:4px;scrollbar-width:none}
.scorerail::-webkit-scrollbar{display:none}
.scorechip{flex:0 0 auto;min-width:108px;padding:12px 14px;border-radius:16px;background:linear-gradient(165deg,var(--panel-2),var(--panel));border:1px solid var(--panel-line);position:relative}
.scorechip.lead{border-color:var(--gold);box-shadow:0 0 0 1px rgba(255,210,74,.4)}
.scorechip.turn{border-color:var(--coral)}
.scorechip .nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
.scorechip .pts{font-family:var(--display);font-weight:700;font-size:26px;margin-top:4px;line-height:1}
.scorechip .crown{position:absolute;top:-9px;right:8px;font-size:16px}
.scorechip .mini{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:18px 0 8px}
.pod{flex:1;max-width:120px;text-align:center}
.pod .bar{border-radius:14px 14px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:12px;font-family:var(--display);font-weight:700;font-size:24px}
.pod.first .bar{height:140px;background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#3a2400}
.pod.second .bar{height:104px;background:linear-gradient(180deg,#d7d2e8,#a59cc4);color:#241a40}
.pod.third .bar{height:80px;background:linear-gradient(180deg,var(--coral),var(--coral-deep));color:#3a000c}
.pod .who{font-weight:600;margin-top:8px;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pod .sc{color:var(--muted);font-size:13px}
.table{width:100%;border-collapse:collapse;font-size:14px}
.table th{text-align:left;color:var(--faint);font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:600;padding:8px;border-bottom:1px solid var(--panel-line)}
.table td{padding:11px 8px;border-bottom:1px solid rgba(255,255,255,.05)}
.table tr td:first-child{font-weight:600}
.table .rank{width:26px;color:var(--gold);font-family:var(--display);font-weight:700}
.table .pts{text-align:right;font-family:var(--display);font-weight:700;color:var(--gold)}
.table td.c,.table th.c{text-align:center;width:38px}
.round h4{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin:14px 0 8px;font-weight:700}
.match{display:flex;flex-direction:column;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--panel-line);border-radius:12px;padding:8px;margin-bottom:8px}
.slot{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:9px;background:rgba(0,0,0,.2);font-weight:600;font-size:14px}
.slot.win{background:rgba(61,220,151,.14);border:1px solid rgba(61,220,151,.3)}.slot.lose{opacity:.5}
.champ{text-align:center;padding:18px;border-radius:16px;background:linear-gradient(165deg,rgba(255,210,74,.16),rgba(255,210,74,.05));border:1px solid rgba(255,210,74,.4);margin-top:10px}
.champ .t{font-size:40px}.champ .n{font-family:var(--display);font-weight:700;font-size:24px;margin-top:4px}
.award-banner{padding:12px 14px;border-radius:14px;margin-bottom:12px;border:1px solid rgba(255,210,74,.35);background:linear-gradient(145deg,rgba(255,210,74,.16),rgba(255,210,74,.08));color:#ffe9a8;font-weight:700;text-align:center}
.finals-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}
.finalist-card{padding:12px 14px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid var(--panel-line)}
.finalist-card strong{display:block;font-family:var(--display);font-size:16px;color:var(--gold)}
.finalist-card span{display:block;margin-top:4px;color:var(--muted);font-size:13px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#2d2150;border:1px solid var(--panel-line);padding:12px 18px;border-radius:14px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:50;font-size:14px;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

          else if(pattern===2){pool.push({type:'mcq',text:`A rectangle has length ${base} cm and width ${height} cm. What is its area?`,options:[String(area),String(area+base),String(area+height),String(area+base+height)],answerIndex:0,answerText:String(area),subj:'Mathematics',difficulty:'Level 2'});}
          else if(pattern===3){pool.push({type:'mcq',text:`A classroom has 12 posters and 9 notebooks. How many items are there in total?`,options:['21','18','9','3'],answerIndex:0,answerText:'21',subj:'Mathematics',difficulty:'Level 2'});}
          else if(pattern===4){pool.push({type:'mcq',text:`A triangle has angles ${angleA}°, ${angleB}° and x°. What is x°?`,options:[String(180-angleA-angleB),String(180-angleA-angleB+5),String(180-angleA-angleB-5),String(90)],answerIndex:0,answerText:String(180-angleA-angleB),subj:'Mathematics',difficulty:'Level 2'});}
          else{pool.push({type:'mcq',text:`If the ratio of boys to girls is ${ratio}:1 and there are ${parts} boys, how many girls are there?`,options:['1','2','3','4'],answerIndex:0,answerText:'1',subj:'Mathematics',difficulty:'Level 2'});}
        }
        else{const topic=i%5;
          if(topic===0){const x=4+(seed%5);const y=3+(seed%4);const lt=`${x}x + ${y}`;pool.push({type:'short',text:`A farmer mixes ${x} kg of maize with ${y} kg of millet. How many kilograms of grain are there in total?`,answer:String(x+y),subj:'Mathematics',difficulty:'Level 3'});}
          else if(topic===1){const length=7+(seed%4);const width=5+(seed%3);const area=length*width;pool.push({type:'short',text:`A school field is ${length} m long and ${width} m wide. What is its area in square metres?`,answer:String(area),subj:'Mathematics',difficulty:'Level 3'});}
          else if(topic===2){const a=3+(seed%3);const b=4+(seed%3);const c=5+(seed%2);const volume=a*b*c;pool.push({type:'short',text:`A box measures ${a} cm by ${b} cm by ${c} cm. What is its volume?`,answer:String(volume),subj:'Mathematics',difficulty:'Level 4'});}
          else if(topic===3){const angleA=30+(seed%25);const angleB=60+(seed%20);pool.push({type:'short',text:`A right-angled triangle has one acute angle of ${angleA}° and another acute angle of ${angleB}°. What is the right angle?`,answer:'90',subj:'Mathematics',difficulty:'Level 4'});}
          else{pool.push({type:'short',text:`A bag has 5 red balls and 3 blue balls. What is the probability of choosing a blue ball?`,answer:'3/8',subj:'Mathematics',difficulty:'Level 4'});}}
      }
      else if(subj==='English' || subj.includes('English')){
        if(roundIndex===0){
          const choices=['The pupils were reading when the teacher arrived.','The pupils was reading when the teacher arrived.','The pupils are reading when the teacher arrived.','The pupils read when the teacher arrive.'];const correct=choices[0];pool.push({type:'mcq',text:`Choose the sentence that is grammatically correct in a formal school report ${context}.`,options:choices,answerIndex:0,answerText:correct,subj:'English',difficulty:'Level 1'});}
        else if(roundIndex===1){
          const choices=['The speaker explained the issue clearly and logically.','The speaker explain the issue clear and logic.','The speaker explained the issue clear and logical.','The speaker explaining the issue clearly and logical.'];const correct=choices[0];pool.push({type:'mcq',text:`Which sentence uses vocabulary and structure most effectively in a formal debate ${context}?`,options:choices,answerIndex:0,answerText:correct,subj:'English',difficulty:'Level 2-4'});}
        else{pool.push({type:'short',text:`In a short essay ${context}, write one sentence that explains the main idea of the passage: “The committee studied the report carefully before making its decision.”`,answer:'The committee studied the report carefully before making its decision.',subj:'English',difficulty:'Scenario'});}
      }
      else{
        if(roundIndex===0){const parts=['Roots','Leaves','Stem','Flowers'];pool.push({type:'mcq',text:`In a biology lesson ${context}, which structure in a flowering plant absorbs water and mineral ions from the soil?`,options:parts,answerIndex:0,answerText:'Roots',subj:'Science',difficulty:'Level 1'});}
        else if(roundIndex===1){const parts=['Oxygen','Nitrogen','Carbon dioxide','Hydrogen'];pool.push({type:'mcq',text:`During a respiration experiment ${context}, which gas is needed for aerobic respiration?`,options:parts,answerIndex:0,answerText:'Oxygen',subj:'Science',difficulty:'Level 2-4'});}
        else{pool.push({type:'short',text:`In a practical investigation ${context}, explain one reason why a metal spoon feels colder than a wooden spoon at room temperature.`,answer:'Metals conduct heat away from the hand more quickly.',subj:'Science',difficulty:'Scenario'});}
      }
    }
    list.push(pool);
  }
  return list;
}
function getQuestionBank(level, subject, rounds, perRound){
  const key=`${level||'JHS'}::${subject||'All subjects'}::${rounds||3}::${perRound||200}`;
  if(!S.questionBank || S.questionBank.key!==key){S.questionBank={key, bank:buildQuestionBank(level, subject, rounds, perRound)};}
  return S.questionBank.bank;
}
function enrichSnapWithQuestion(m){
  if(!m||m.phase!=='playing')return m;
  const level=(m.settings&&m.settings.level)||CREATE.level;
  const subject=(m.settings&&m.settings.subject)||CREATE.subject;
  const rounds=(m.settings&&m.settings.rounds)||3;
  const perRound=(m.settings&&m.settings.perRound)||200;
  const bank=getQuestionBank(level, subject, rounds, perRound);
  const roundBank=bank[Math.min(m.round||0, bank.length-1)]||[];
  const fallback=roundBank[Math.min(m.qInRound||0, roundBank.length-1)]||null;
  const q=normalizeQuestionShape((m.question&&typeof m.question==='object')?m.question:fallback, m);
  if(q){m.question=q; if(m.correctIndex==null && q.answerIndex!=null)m.correctIndex=q.answerIndex;}
  return m;
}
function snapSignature(m){
  const players=Array.isArray(m.players)?m.players.map(p=>`${p.id}:${p.score}:${p.connected?1:0}:${p.name||''}`).join('|'):'';
  const q=m.question&&typeof m.question==='object'?m.question:{};
  return `${m.phase||''}|${m.stage||''}|${m.round||0}|${m.qInRound||0}|${m.ownerId||''}|${m.revealed?1:0}|${m.bonusWinnerId||''}|${(m.bonusLockedIds||[]).join(',')}|${players}|${q.text||''}|${q.type||''}|${m.subjLabel||''}`;
}
function applySnap(m){
  if(!m||m.__neterr||m.error)return;
  S.snap=enrichSnapWithQuestion(m); clockOffset=Date.now()-m.serverNow;
  const qkey=m.round+':'+m.qInRound;
  if(S.pickKey!==qkey){S.myPick=null;S.pickKey=qkey;}
  const targetScreen=m.phase==='lobby'?'lobby':m.phase==='playing'?'game':m.phase==='finished'?'results':'home';
  const previousScreen=S.screen;
  if(targetScreen!==previousScreen){S.screen=targetScreen;}
  const sig=snapSignature(m);
  const shouldRender=previousScreen!==targetScreen || S.lastSnapSignature!==sig;
  if(m.qm&&m.qm.id!==TTS.lastId){TTS.lastId=m.qm.id;speak(m.qm.text);if(m.stage==='reveal'&&m.ownResult==='correct')fireConfetti();if(m.bonusWinnerId)fireConfetti();}
  if(shouldRender){S.lastSnapSignature=sig;render();}
  startCountdown();
}
function startPolling(){stopPolling();pollTimer=setInterval(poll,1200);poll();}
function stopPolling(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}

async function doAnswer(idx, rawText){
  if(!requireAuth())return;
  if(S.myPick!=null)return;
  const m=S.snap;
  const q=(m&&m.question&&typeof m.question==='object')?m.question:null;
  if(q&&q.type==='short'){
    const text=String(rawText||'').trim();
    if(!text){toast('Type your answer first');return;}
    S.myPick=text;render();applySnap(await api('answer',{code:lastRoom(),playerId:ME.id,choice:text}));return;
  }
  if(typeof idx!=='number'||idx<0)return;
  S.myPick=idx;render();applySnap(await api('answer',{code:lastRoom(),playerId:ME.id,choice:idx}));
}

function doCopyCode(){const c=lastRoom();if(!c)return;const done=()=>toast('Code copied');
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(c).then(done).catch(()=>toast('Code: '+c));}
  else{try{const t=document.createElement('textarea');t.value=c;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();done();}catch(e){toast('Code: '+c);}}}
async function doShare(){const c=lastRoom();if(!c)return;
  const text=`Join my DasQuiz room! Code: ${c}`;const url=location.origin+'/?action=join';
  if(navigator.share){try{await navigator.share({title:'DasQuiz',text,url});return;}catch(e){if(e&&e.name==='AbortError')return;}}
  doCopyCode();}

/* ---- countdown ---- */
function startCountdown(){clearInterval(countdownT);const m=S.snap;if(!m||!['answering','bonus'].includes(m.stage))return;
  const paint=()=>{const el=document.getElementById('qtimer');if(!el)return;const rem=Math.max(0,Math.ceil((m.deadline-(Date.now()-clockOffset))/1000));el.innerHTML='<span class="ring"></span>'+rem+'s';el.className='qtimer'+(rem<=10?' low':'');if(rem<=0)clearInterval(countdownT);};
  paint();countdownT=setInterval(paint,250);}

const app=()=>document.getElementById('app');
function render(){
  const el = app();
  const scrollTop = el ? el.scrollTop || 0 : 0;
  const activeId = document.activeElement && document.activeElement.id ? document.activeElement.id : null;
  // Keep DOM stable: only replace innerHTML when markup changed.
  // Otherwise frequent rerenders during polling cause layout thrash / "shaky" UI.
  const next = offlineBanner() + view();
  if(!el.dataset.__lastView || el.dataset.__lastView !== next){
    el.dataset.__lastView = next;
    el.innerHTML = next;
    bind();
  }
  paintConn();
  try{ if(el) el.scrollTop = scrollTop; if(activeId){const a=document.getElementById(activeId); if(a) a.focus();} }catch(e){}
  requestAnimationFrame(()=>{document.body.classList.add('ready');renderMathNodes();});
}

    </div>
  </div>`;}
function playerRow(p,m){const isMe=p.id===ME.id,isHost=m&&p.id===m.hostId;let tag=isHost?'<span class="tag host">HOST</span>':'';if(p.isAI)tag='<span class="tag ai">AI</span>';else if(isMe)tag+=' <span class="tag you">YOU</span>';const dim=!p.isAI&&!p.connected?' dim':'';return `<div class="pcard${dim}"><div class="avatar" style="background:${p.isAI?'var(--sky)':avColor(p.id)}">${p.isAI?'◈':initials(p.name)}</div><div class="nm">${esc(p.name)}${(!p.isAI&&!p.connected)?' <span class="faint" style="font-weight:400">(offline)</span>':''}</div>${tag}</div>`;}

function viewGame(){const m=S.snap;if(!m)return viewLobby();
  const isOwner=m.ownerId===ME.id;const owner=(m.players.find(p=>p.id===m.ownerId)||{}).name||'…';
  const bonus=m.stage==='bonus';const meLocked=(m.bonusLockedIds||[]).includes(ME.id);
  const bubble=`<div class="qmwrap"><div class="qmorb"></div><div class="qmbubble ${m.qm.mood||'sky'}"><div class="who"><span class="live"></span>Aria · quiz master</div><div class="txt">${esc(m.qm.text||'…')}</div></div></div>`;
  if(m.stage==='intro'||m.stage==='roundIntro'||m.stage==='roundEnd'){
    const ic=m.stage==='intro'?'🎙️':m.stage==='roundEnd'?'🏁':'▶️';const h=m.stage==='intro'?'Get ready!':m.stage==='roundEnd'?'Round '+(m.round+1)+' done':'Round '+(m.round+1)+' of '+m.settings.rounds;
    return topbar(`<button class="iconbtn" data-leave="1">✕</button>`)+`<div class="stage"><div class="spot"></div>${bubble}<div class="pass"><div class="ic">${ic}</div><h3>${h}</h3><p class="muted">${esc(m.subjLabel)}</p></div>${scoreboard(m)}</div>`;}
  const q=m.question||{text:'',options:['','','','']};
  const canOwn=m.stage==='answering'&&isOwner&&S.myPick==null&&!m.revealed;
  const canBonus=bonus&&!isOwner&&!meLocked&&!m.revealed&&!m.bonusWinnerId&&S.myPick==null;
  let flag='';
  if(m.stage==='answering')flag=isOwner?`<div class="turnflag coral">● Your question — ${q.type==='short'?'type your answer':'choose an answer'}</div>`:`<div class="turnflag">● ${esc(owner)}'s question — watch & wait</div>`;
  else if(bonus)flag=isOwner?`<div class="turnflag">● Bonus is open to your rivals</div>`:meLocked?`<div class="turnflag">● Your bonus attempt is used</div>`:`<div class="turnflag mint">● BONUS! First correct answer steals it</div>`;
  const timer=(['answering','bonus'].includes(m.stage)&&!m.revealed)?`<span class="qtimer" id="qtimer"><span class="ring"></span>—</span>`:'';
  const bonusbar=bonus?`<div class="bonusbar">⚡ Steal for +1 — ${esc(owner)} missed it</div>`:'';
  const opts=`<div class="options">`+q.options.map((t,i)=>{let cls='opt';
    if(m.revealed){if(i===m.correctIndex)cls+=' correct';else if(i===S.myPick)cls+=' wrong';}
    else if(i===S.myPick)cls+=' picked';
    const en=(canOwn||canBonus);
    return `<button class="${cls}" data-pick="${i}" ${en?'':'disabled'}><span class="key">${"ABCD"[i]}</span><span>${renderMathText(t)}</span></button>`;
  }).join('')+`</div>`;
  let note='';
  if(m.stage==='answering'&&isOwner&&S.myPick!=null&&!m.revealed)note=`<p class="center muted" style="margin-top:12px">Locked in — Aria is checking…</p>`;
  if(bonus&&!isOwner&&S.myPick!=null&&!m.revealed)note=`<p class="center muted" style="margin-top:12px">Buzzed! Let's see…</p>`;
  const hostNote=(m.hostId===ME.id)?`<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(255,210,74,.07);border:1px solid rgba(255,210,74,.22);border-radius:14px;padding:11px 14px;margin:6px 0 12px;font-size:13px;color:#ffe9a8"><span>★ You're the host</span><button class="btn ghost sm" id="skipBtn">Skip ▷</button></div>`:'';
  return topbar(`<button class="iconbtn" data-leave="1">✕</button>`)+`
  <div class="stage"><div class="spot"></div>${bubble}
    <div class="qmeta"><span class="rbadge">Round ${m.round+1}/${m.settings.rounds}</span><span class="cat">${esc(q.subj||m.settings.subject)}</span><span class="num">${timer||('Q '+(m.qInRound+1)+'/'+m.settings.perRound)}</span></div>
    ${flag}${bonusbar}
    <div class="qcard"><div class="qtext">${renderMathText(q.text)}</div></div>
    ${q.type==='short' ? `<div class="panel" style="padding:12px 14px;margin-bottom:12px"><div class="label" style="margin-bottom:8px">Type your answer</div><input class="field" id="shortAnswerInput" maxlength="120" placeholder="Write your answer here" value="${esc(S.myPick && typeof S.myPick==='string'?S.myPick:'')}" ${canOwn||canBonus?'':'disabled'}><button class="btn" id="shortAnswerSubmit" style="margin-top:10px" ${canOwn||canBonus?'':'disabled'}>Submit answer</button></div>` : opts}${note}
  </div>
  ${hostNote}${scoreboard(m)}`;}
function scoreboard(m){const max=Math.max(0,...m.players.map(p=>p.score));return `<div class="scorerail">`+[...m.players].sort((a,b)=>b.score-a.score).map(p=>{const lead=p.score===max&&max>0;const turn=p.id===m.ownerId&&m.stage==='answering';return `<div class="scorechip ${lead?'lead':''} ${turn?'turn':''}">${lead?'<span class="crown">♛</span>':''}<div class="nm"><span class="mini" style="background:${p.isAI?'var(--sky)':avColor(p.id)}"></span>${esc(p.name)}${p.id===ME.id?' (you)':''}${p.isAI?' ◈':''}</div><div class="pts">${p.score}</div></div>`;}).join('')+`</div>`;}

function viewResults(){const m=S.snap;if(!m)return viewHome();const s=[...m.players].sort((a,b)=>b.score-a.score);const tie=s.length>1&&s[0].score===s[1].score;
  const podium=`<div class="podium">${s[1]?podBlock('second',s[1]):''}${s[0]?podBlock('first',s[0]):''}${s[2]?podBlock('third',s[2]):''}</div>`;
  const rest=s.slice(3).map(p=>`<div class="pcard"><div class="avatar" style="background:${p.isAI?'var(--sky)':avColor(p.id)}">${p.isAI?'◈':initials(p.name)}</div><div class="nm">${esc(p.name)}</div><div style="font-family:var(--display);font-weight:700;color:var(--gold)">${p.score}</div></div>`).join('');
  const champion = s[0] ? `<div class="award-banner">🏅 ${esc(s[0].name)} takes the Champion's Cup and the winner's award</div>` : '';
  return topbar()+`<div class="panel center"><p class="label">Final results · ${esc(m.subjLabel)}</p><h2 style="font-size:26px">${tie?'🤝 It\'s a tie!':'🏆 '+esc(s[0].name)+' wins!'}</h2>
    ${champion}${podium}${rest?`<div class="players" style="margin-top:14px">${rest}</div>`:''}
    <div class="btnrow"><button class="btn sm" data-go="create" id="newRoom" style="flex:1">New room</button><button class="btn ghost sm" data-leave="1" style="flex:1">Leave</button></div></div>`;}
function podBlock(place,p){const label={first:'1',second:'2',third:'3'}[place];return `<div class="pod ${place}"><div class="bar">${label}</div><div class="who">${esc(p.name)}</div><div class="sc">${p.score} pts</div></div>`;}

function viewTournament(){
  const league = (S.league && Array.isArray(S.league)) ? S.league : [];
  const top = league.slice(0, 12);
  const empty = !top.length;
  const champion = top[0];
  const finalists = top.slice(0, 2);
  const ladder = top.slice(2, 8);
  const awardBlock = champion ? `<div class="award-banner">🏅 ${esc(champion.name)} is the league champion and takes the winner's award</div>` : '';
  const finalsBlock = finalists.length >= 2 ? `<div class="panel" style="margin-top:14px;padding:14px;background:rgba(255,210,74,.08);border-color:rgba(255,210,74,.28)">
    <div class="label" style="margin-top:0">Tournament final two</div>
    <div class="finals-row">
      <div class="finalist-card"><strong>${esc(finalists[0].name)}</strong><span>Finalist • ${finalists[0].pts} pts</span></div>
      <div class="finalist-card"><strong>${esc(finalists[1].name)}</strong><span>Finalist • ${finalists[1].pts} pts</span></div>
    </div>
    <p class="sub" style="margin-top:10px">The last two standing move straight into the final showdown. The rest are eliminated from the ladder.</p>
  </div>` : '';
  return topbar(`
    <button class="iconbtn" data-go="home" title="Home">⌂</button>
    <button class="iconbtn" data-do="refreshLeague" title="Refresh">⟳</button>
  `)+`
  <div class="panel fade">
    <h2 style="margin-top:0">Tournament · League</h2>
    <p class="sub">Top players across all rooms. (Powered by ${dbLabel()})</p>
    ${empty ? `<div class="listen" style="margin-top:12px">No league entries yet. Finish a match to start the leaderboard.</div>` : `
      ${awardBlock}
      ${finalsBlock}
      <table class="table" style="margin-top:14px">
        <thead><tr><th class="c">#</th><th>Player</th><th class="c">Pts</th><th class="c">Played</th><th class="c">Won</th></tr></thead>
        <tbody>
          ${top.map((r,i)=>`<tr><td class="rank">${i+1}</td><td>${esc(r.name)}</td><td class="pts">${r.pts}</td><td>${r.played}</td><td>${r.won}</td></tr>`).join('')}
        </tbody>
      </table>
      ${ladder.length ? `<div class="listen" style="margin-top:12px">Elimination ladder: ${ladder.map(r=>esc(r.name)).join(' • ')}</div>` : ''}
    `}
    <div class="btnrow" style="margin-top:16px">
      <button class="btn sm" data-go="create" style="flex:1">New room</button>
      <button class="btn ghost sm" data-go="home" style="flex:1">Back</button>
    </div>
  </div>`;}

function dbLabel(){
  // client-only: infer from env not available, so show generic label
  return (typeof TURSO !== 'undefined' && TURSO) ? 'Turso' : 'server store';
}


/* ---- binding ---- */
function bind(){
  const ni=document.getElementById('nameIn');if(ni)ni.oninput=()=>setName(ni.value.trim());
  document.querySelectorAll('[data-do]').forEach(b=>b.onclick=()=>{const d=b.dataset.do;if(d==='refreshLeague')refreshLeague();});

  document.querySelectorAll('[data-audio]').forEach(b=>b.onclick=()=>{TTS.on=!TTS.on;if(!TTS.on){try{speechSynthesis.cancel();}catch(e){}}else primeAudio();render();});
  document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{const g=b.dataset.go;if(g==='create'||g==='join'){if(!requireAuth())return;if(g==='home'||g==='create'||g==='join'){if(S.snap&&S.snap.phase==='finished'){sendWS({type:'leave',playerId:ME.id});}setLastRoom('');S.snap=null;}S.screen=g;render();return;}if(g==='home'||g==='create'||g==='join'){if(S.snap&&S.snap.phase==='finished'){sendWS({type:'leave',playerId:ME.id});}setLastRoom('');S.snap=null;}S.screen=g;render();});
  document.querySelectorAll('[data-leave]').forEach(b=>b.onclick=()=>doLeave());
  const openCreate=()=>{if(!requireAuth())return;const v=(document.getElementById('nameIn').value||'').trim();if(!v){toast('Enter your name first');return;}setName(v);S.screen='create';render();};
  const openJoin=()=>{if(!requireAuth())return;const v=(document.getElementById('nameIn').value||'').trim();if(!v){toast('Enter your name first');return;}setName(v);S.screen='join';render();};
  const gc=document.getElementById('goCreate');if(gc)gc.onclick=openCreate;
  const gj=document.getElementById('goJoin');if(gj)gj.onclick=openJoin;
  const gca=document.getElementById('goCreateAlt');if(gca)gca.onclick=openCreate;
  const gja=document.getElementById('goJoinAlt');if(gja)gja.onclick=openJoin;
  document.querySelectorAll('[data-cl]').forEach(b=>b.onclick=()=>{CREATE.level=b.dataset.cl;if(!SUBJECTS[CREATE.level].includes(CREATE.subject))CREATE.subject='All subjects';render();});
  document.querySelectorAll('[data-cs]').forEach(b=>b.onclick=()=>{CREATE.subject=b.dataset.cs;render();});
  document.querySelectorAll('[data-cp]').forEach(b=>b.onclick=()=>{CREATE.perRound=+b.dataset.cp;render();});
  document.querySelectorAll('[data-cx]').forEach(b=>b.onclick=()=>{CREATE.seconds=+b.dataset.cx;render();});
  document.querySelectorAll('[data-ca]').forEach(b=>b.onclick=()=>{CREATE.aiCount=+b.dataset.ca;render();});
  document.querySelectorAll('[data-cd]').forEach(b=>b.onclick=()=>{CREATE.aiDiff=b.dataset.cd;render();});
  const cb=document.getElementById('createBtn');if(cb)cb.onclick=()=>doCreate();
  const ci=document.getElementById('codeIn');if(ci)ci.oninput=e=>{e.target.value=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');};
  const jb=document.getElementById('joinBtn');if(jb)jb.onclick=()=>doJoin(document.getElementById('codeIn').value);
  const sb=document.getElementById('startBtn');if(sb)sb.onclick=()=>doStart();
  const sk=document.getElementById('skipBtn');if(sk)sk.onclick=()=>doSkip();
  const shb=document.getElementById('shareBtn');if(shb)shb.onclick=()=>doShare();
  const cpb=document.getElementById('copyBtn');if(cpb)cpb.onclick=()=>doCopyCode();
  document.querySelectorAll('[data-pick]').forEach(b=>b.onclick=()=>doAnswer(+b.dataset.pick));
  const shortInput=document.getElementById('shortAnswerInput');if(shortInput){shortInput.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();doAnswer(null, shortInput.value);}};}
  const shortSubmit=document.getElementById('shortAnswerSubmit');if(shortSubmit)shortSubmit.onclick=()=>doAnswer(null, shortInput?shortInput.value:'');
  const ib=document.getElementById('installBtn');if(ib)ib.onclick=async()=>{if(!PWA.prompt)return;PWA.prompt.prompt();try{const r=await PWA.prompt.userChoice;if(r&&r.outcome==='accepted'){PWA.installed=true;}}catch(e){}PWA.prompt=null;render();};
  const rb=document.getElementById('retryBtn');if(rb)rb.onclick=()=>doRetry();

  // Auth handlers
  const signupBtn=document.getElementById('signupBtn');if(signupBtn)signupBtn.onclick=async()=>{const email=document.getElementById('signupEmail').value.trim();const name=document.getElementById('signupName').value.trim();const pass=document.getElementById('signupPass').value;if(!email||!name||!pass){toast('Fill in all fields');return;}try{const r=await fetch('/api/signup',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email,displayName:name,password:pass})});const j=await r.json();if(!r.ok){toast(j.error||'Signup failed');return;}setAuth(j.token,j.user);S.screen='home';render();}catch(e){toast('Signup error');}};
  
  const loginBtn=document.getElementById('loginBtn');if(loginBtn)loginBtn.onclick=async()=>{const email=document.getElementById('loginEmail').value.trim();const pass=document.getElementById('loginPass').value;if(!email||!pass){toast('Enter email and password');return;}try{const r=await fetch('/api/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email,password:pass})});const j=await r.json();if(!r.ok){toast(j.error||'Login failed');return;}setAuth(j.token,j.user);S.screen='home';render();}catch(e){toast('Login error');}};
  bindLogout();
  }

/* ---- boot ---- */
window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();PWA.prompt=e;if(S.screen==='home')render();});
window.addEventListener('appinstalled',()=>{PWA.installed=true;PWA.prompt=null;if(S.screen==='home')render();});
window.addEventListener('online',()=>{setConn(true);if(lastRoom())startPolling();});
window.addEventListener('offline',()=>setConn(false));
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{});});}
document.addEventListener('pointerdown',primeAudio,{once:true});
loadVoices();

async function refreshLeague(){
  try{
    const r=await fetch('/api/league',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({})});
    const j=await r.json().catch(()=>({}));
    if(j&&j.league)S.league=j.league;
  }catch(e){}
  if(S.screen==='tournament')render();
}

const _act=new URLSearchParams(location.search).get('action');

if(lastRoom()){S.screen='lobby';startPolling();}
else if(_act==='create'){if(requireAuth())S.screen='create';}
else if(_act==='join'){if(requireAuth())S.screen='join';}
else if(_act==='tournament'){S.screen='tournament';refreshLeague();}
document.body.classList.add('ready');
render();

</script>
</body>
</html>
